<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Car Care App</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // Semantic Colors (Mapped to CSS Variables for auto-switching)
                        "primary": "rgb(var(--primary-rgb) / <alpha-value>)",
                        "primary-hover": "var(--primary-hover)",
                        "primary-soft": "rgb(var(--primary-rgb) / 0.1)", // Auto soft based on primary

                        // Backgrounds
                        "background-light": "#F6F8FB",
                        "background-dark": "#0B1220",
                        
                        // Surfaces / Cards
                        "card-light": "#FFFFFF",
                        "card-dark": "#111C2E",
                        "surface-light": "#F1F5F9",
                        "surface-dark": "#0F1A2B",

                        // Text
                        "text-main": "#0F172A",
                        "text-main-dark": "#E5E7EB",
                        "text-muted": "#475569",
                        "text-muted-dark": "#94A3B8",
                        "text-subtle": "#64748B",
                        "text-light": "#FFFFFF", // Fixed white

                        // Legacy / Helper mappings
                        "neutral-dark": "#0F172A", 
                        "neutral-muted": "#475569",

                        // Status Colors (Matching request)
                        "success": "#16A34A",
                        "warning": "#F59E0B",
                        "danger": "#EF4444",
                        "info": "#0EA5E9",

                        // Override Grays to match Border/Surface specs
                        gray: {
                            50: '#F8FAFC',
                            100: '#F1F5F9', // Surface 2 Light
                            200: '#E2E8F0', // Border Light
                            300: '#CBD5E1',
                            400: '#94A3B8', // Text Muted Dark
                            500: '#64748B', // Text Subtle
                            600: '#475569', // Text Muted Light
                            700: '#243044', // Border Dark
                            800: '#111C2E', // Surface Dark
                            900: '#0F172A', // Text Main Light
                        }
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft": "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        "glow": "0 0 15px rgba(37, 99, 235, 0.3)"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(0, 0, 0, 0.1); border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.1); }
        .form-input-transition { transition: border-color 0.2s ease, box-shadow 0.2s ease; }

        /* CSS Variables for Primary Color Switching with Opacity Support */
        :root {
            /* Light Mode: #2563EB -> 37 99 235 */
            --primary-rgb: 37 99 235;
            --primary-hover: #1D4ED8;
        }
        .dark {
            /* Dark Mode: #3B82F6 -> 59 130 246 */
            --primary-rgb: 59 130 246;
            --primary-hover: #60A5FA;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main dark:text-text-main-dark transition-colors duration-200">
    <div id="root"></div>
</body>
</html>
